<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance Planner - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f1420 50%, #0a0e1a 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background glow effects */
        body::before {
            content: '';
            position: fixed;
            top: 20%;
            left: 5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 255, 150, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 20%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 100, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }

        /* Floating Rupee Icons */
        .floating-icon {
            position: fixed;
            width: 70px;
            height: 70px;
            background: rgba(0, 255, 150, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #00ff96;
            border: 1px solid rgba(0, 255, 150, 0.15);
            box-shadow: 
                0 8px 32px rgba(0, 255, 150, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .floating-icon.top-left {
            left: 15%;
            top: 25%;
            transform: rotate(-20deg);
        }

        .floating-icon.top-right {
            right: 18%;
            top: 20%;
            transform: rotate(15deg);
        }

        .floating-icon.bottom-left {
            left: 12%;
            bottom: 30%;
            transform: rotate(10deg);
            background: rgba(0, 100, 255, 0.08);
            border: 1px solid rgba(0, 100, 255, 0.15);
            color: #4d9fff;
        }

        .floating-chart {
            position: fixed;
            right: 12%;
            bottom: 35%;
            width: 90px;
            height: 90px;
            background: rgba(0, 150, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0, 150, 255, 0.15);
            box-shadow: 
                0 8px 32px rgba(0, 150, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .floating-chart svg {
            width: 50px;
            height: 50px;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px 36px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00ff96 0%, #00cc78 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            color: #0a0a1a;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .wave-emoji {
            font-size: 24px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(0, 255, 150, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-input:focus {
            border-color: rgba(0, 255, 150, 0.6);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 255, 150, 0.1);
        }

        .form-input.password-field {
            padding-right: 45px;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .form-input.password-field:focus {
            border-color: rgba(0, 255, 150, 0.5);
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 20px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .password-toggle:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Form Options */
        .form-options {
            display: flex;
            justify-content: right;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .remember-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00ff96;
            cursor: pointer;
        }

        .remember-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 14px;
            color: #00ff96;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #00cc78 0%, #009e5c 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 150, 0.3);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 16px;
        }

        /* Social Buttons */
        .social-buttons {
            display: grid;
            
            gap: 10px;
            margin-bottom: 24px;
        }

        .btn-social {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-social svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Sign Up Link */
        .signup-link {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .signup-link a {
            color: #00ff96;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 2;
        }

        .footer-heart {
            color: #ff6b6b;
        }

        /* Grok Logo */
        .grok-logo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            font-weight: 500;
            z-index: 2;
        }

        .grok-icon {
            width: 24px;
            height: 24px;
        }
        .errormessage{
            margin-bottom: 0.75rem;
            color: rgb(248 113 113);
            border: rgb(248 113 113) solid 1.5px;
            border-radius: 5px;
            padding: 0.75rem 1rem;
            background-color: rgb(239 68 68 / 0.1);
            --tw-border-opacity: 1;
            border-color: rgb(239 68 68 / var(--tw-border-opacity, 1));
            border-width: 1px;
            border-radius: 1rem;
            font-size: 0.875rem;
            line-height: 0.75rem;
        }
    </style>
</head>
<body>
    <!-- Floating Elements -->
    <div class="floating-icon top-left">₹</div>

    <div class="floating-icon bottom-left">₹</div>

                                <line x1="1" y1="1" x2="23" y2="23"/>

                    <a href="/forgot_password/" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit">Login</button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>Or continue with</span>
            </div>

            <!-- Social Buttons -->

                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>

                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>

                <!-- <button class="btn-social">
                    <svg viewBox="0 0 24 24" fill="#fff">

            </div>

            <!-- Sign Up Link -->
            <div class="signup-link">
                Don't have an account? <a href="/signuppage">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 Smart Finance Planner • Made with <span class="footer-heart">❤</span> in India

    <script class="backfix">
        window.addEventListener("pageshow",function(event){
            if (event.persisted|| window.performance.getEntriesByType("navigation")[0].type === "back_forward"){
                window.location.reload();
            }
        });
    </script>
</body>
</html>
